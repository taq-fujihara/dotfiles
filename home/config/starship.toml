format = """
[](#8fbcbb)\
$username$hostname\
[](bg:#5e81ac fg:#8fbcbb)\
$directory\
[](fg:#5e81ac bg:#88c0d0)\
$git_branch\
$git_status\
[](fg:#88c0d0 bg:#81a1c1)\
$bun\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$lua\
$nodejs\
$nim\
$python\
$rust\
[](fg:#81a1c1) \
$fill\
$time
$character
"""

add_newline = true
command_timeout = 2000

[fill]
symbol = "-"
style = "#81a1c1"

[character]
success_symbol = '[](#86BBD8)'
error_symbol = '[](#81a1c1)'
vimcmd_symbol = '[](#88c0d0)'
vimcmd_replace_one_symbol = '[](#88c0d0)'
vimcmd_replace_symbol = '[](#88c0d0)'
vimcmd_visual_symbol = '[](#88c0d0)'

[hostname]
ssh_only = true
format = '[ @$hostname ]($style)'
style = "bg:#8fbcbb"
disabled = false

[username]
show_always = true
style_user = "fg:#37474F bg:#8fbcbb"
style_root = "fg:#37474F bg:#8fbcbb"
format = '[󱐋 ]($style)'
# format = '[ ]($style)'

[directory]
style = "fg:#ECEFF1 bg:#5e81ac"
format = "[ $path ]($style)"
truncation_length = 5
truncation_symbol = "…/"

[directory.substitutions]
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[bun]
symbol = "󰳯 "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "fg:#37474F bg:#88c0d0"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bold fg:#37474F bg:#88c0d0"
format = '[$all_status $ahead_behind ]($style)'
up_to_date = '♥'
untracked = 'U'
stashed = 'S'
modified = 'M'
staged = 'A'
renamed = 'R'
deleted = 'D'
ignore_submodules = true

[golang]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[lua]
symbol = ""
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = " "
style = "fg:#FFFFFF bg:#81a1c1"
format = '[ $symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = ""
style = "bg:#81a1c1"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%I:%M%P"
style = "fg:#81a1c1"
format = '[  $time ]($style)'
